    <script>
        (function () {
            var theme = localStorage.getItem('dotenvify-theme');
            if (theme === 'light') {
                document.documentElement.classList.remove('dark');
            } else if (theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else if (window.matchMedia('(prefers-color-scheme: light)').matches) {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
