name: Release dotenvify

# Triggers when a tag matching vMAJOR.MINOR.PATCH is pushed
# Tags like v2.0.1-beta are also supported

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write   # Create GitHub releases
  id-token: write   # npm OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure latest npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run tests
        run: npm run test

      - name: Sync version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          # Update CLI package.json version
          npm pkg set version=$VERSION --workspace=cli
          # Update version in commander .version() call
          sed -i "s/.version(\"[^\"]*\")/.version(\"$VERSION\")/" cli/src/index.ts

      - name: Rebuild CLI with updated version
        run: npm run build --workspace=cli

      - name: Publish to npm
        working-directory: cli
        run: npm publish --provenance --access public || echo "npm publish failed (version may already exist)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
