name: Release JetBrains Plugin

# Builds, signs, and publishes the dotenvify plugin to the JetBrains Marketplace.
# Triggers on tags like jetbrains-v0.2.1 (jetbrains-vMAJOR.MINOR.PATCH).
#
# NOTE: The FIRST version of a new plugin CANNOT be published via the API — it must be
# uploaded manually at https://plugins.jetbrains.com/plugin/add and pass moderation first.
# This workflow is for subsequent releases, once the plugin exists on the Marketplace.
#
# Required repository secrets:
#   JETBRAINS_MARKETPLACE_TOKEN     - Marketplace API token (Profile → My Tokens)
#   JETBRAINS_CERTIFICATE_CHAIN     - plugin signing certificate chain (contents of chain.crt)
#   JETBRAINS_PRIVATE_KEY           - plugin signing private key (contents of private.pem)
#   JETBRAINS_PRIVATE_KEY_PASSWORD  - password for the signing private key

on:
  push:
    tags:
      - 'jetbrains-v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write   # Create GitHub releases / upload the built .zip

jobs:
  release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/jetbrains
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Sync version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/jetbrains-v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          sed -i "s/^pluginVersion=.*/pluginVersion=$VERSION/" gradle.properties

      - name: Write signing material
        env:
          CERTIFICATE_CHAIN: ${{ secrets.JETBRAINS_CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.JETBRAINS_PRIVATE_KEY }}
        run: |
          printf '%s' "$CERTIFICATE_CHAIN" > chain.crt
          printf '%s' "$PRIVATE_KEY" > private.pem

      - name: Build and test
        run: ./gradlew test buildPlugin --console=plain

      - name: Publish to JetBrains Marketplace
        env:
          JETBRAINS_MARKETPLACE_TOKEN: ${{ secrets.JETBRAINS_MARKETPLACE_TOKEN }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.JETBRAINS_PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin --console=plain

      - name: Clean up signing material
        if: always()
        run: rm -f chain.crt private.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: JetBrains Plugin ${{ env.VERSION }}
          generate_release_notes: true
          files: plugins/jetbrains/build/distributions/*.zip
