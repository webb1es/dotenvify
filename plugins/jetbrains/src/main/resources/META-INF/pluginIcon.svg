<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

<defs>

<!-- Firebase gradient -->
<linearGradient id="firebaseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#FFA000"/>
<stop offset="50%" stop-color="#FF6F00"/>
<stop offset="100%" stop-color="#FFD54F"/>
</linearGradient>

<!-- IntelliJ gradient -->
<linearGradient id="intellijGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#8B5CF6"/>
<stop offset="50%" stop-color="#2563EB"/>
<stop offset="100%" stop-color="#22D3EE"/>
</linearGradient>

<!-- Wide outer tooth -->
<path id="outerTooth" d="M230 24 L282 24 L292 72 L220 72 Z"/>

<!-- Inner gear tooth -->
<path id="innerTooth" d="M246 118 L266 118 L272 150 L240 150 Z"/>

</defs>

<!-- OUTER GEAR BODY -->
<circle cx="256" cy="256" r="190" fill="url(#firebaseGrad)"/>

<!-- OUTER TEETH -->
<g fill="url(#firebaseGrad)">
<use href="#outerTooth" transform="rotate(0 256 256)"/>
<use href="#outerTooth" transform="rotate(30 256 256)"/>
<use href="#outerTooth" transform="rotate(60 256 256)"/>
<use href="#outerTooth" transform="rotate(90 256 256)"/>
<use href="#outerTooth" transform="rotate(120 256 256)"/>
<use href="#outerTooth" transform="rotate(150 256 256)"/>
<use href="#outerTooth" transform="rotate(180 256 256)"/>
<use href="#outerTooth" transform="rotate(210 256 256)"/>
<use href="#outerTooth" transform="rotate(240 256 256)"/>
<use href="#outerTooth" transform="rotate(270 256 256)"/>
<use href="#outerTooth" transform="rotate(300 256 256)"/>
<use href="#outerTooth" transform="rotate(330 256 256)"/>
</g>

<!-- CUTOUT -->
<circle cx="256" cy="256" r="150" fill="white"/>

<!-- INNER GEAR BODY -->
<circle cx="256" cy="256" r="120" fill="url(#intellijGrad)"/>

<!-- INNER GEAR TEETH -->
<g fill="url(#intellijGrad)">
<use href="#innerTooth" transform="rotate(0 256 256)"/>
<use href="#innerTooth" transform="rotate(45 256 256)"/>
<use href="#innerTooth" transform="rotate(90 256 256)"/>
<use href="#innerTooth" transform="rotate(135 256 256)"/>
<use href="#innerTooth" transform="rotate(180 256 256)"/>
<use href="#innerTooth" transform="rotate(225 256 256)"/>
<use href="#innerTooth" transform="rotate(270 256 256)"/>
<use href="#innerTooth" transform="rotate(315 256 256)"/>
</g>

<!-- INNER HUB -->
<circle cx="256" cy="256" r="70" fill="white"/>

<!-- SPOKES -->
<g stroke="url(#intellijGrad)" stroke-width="20" stroke-linecap="round">
<line x1="256" y1="160" x2="256" y2="210"/>
<line x1="256" y1="302" x2="256" y2="352"/>
<line x1="160" y1="256" x2="210" y2="256"/>
<line x1="302" y1="256" x2="352" y2="256"/>
</g>

<!-- CENTER -->
<circle cx="256" cy="256" r="36" fill="url(#firebaseGrad)"/>

</svg>
